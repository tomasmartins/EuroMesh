; EuroMeshNode — PlatformIO project for LILYGO T-Watch-S3
; Target: ESP32-S3 + SX1262 LoRa (built-in)

[env:t-watch-s3]
platform              = espressif32@6.3.0
board                 = LilyGoWatch-S3
framework             = arduino

; Use largest readily-available app partition (3 MB app + SPIFFS on 16 MB flash)
board_build.partitions = huge_app.csv
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_flash    = 80000000L

upload_speed  = 460800
upload_flags  = --no-stub
monitor_speed = 115200

; Enable USB CDC so Serial works over the USB-C cable
build_flags =
    -DARDUINO_TWATCH_S3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

lib_deps =
    jgromes/RadioLib@^7.0.0
    adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
    adafruit/Adafruit GFX Library@^1.11.0
    adafruit/Adafruit BusIO@^1.14.0
    lewisxhe/XPowersLib@^0.2.0
